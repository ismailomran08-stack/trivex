<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivex Group — Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9FAFB;
  --card:#FFFFFF;
  --sidebar-bg:#0F1B2D;
  --sidebar-text:rgba(255,255,255,0.6);
  --sidebar-active:#E8500A;
  --orange:#E8500A;
  --orange-hover:#D04508;
  --text:#111827;
  --text-muted:#6B7280;
  --border:#E5E7EB;
  --input-bg:#F9FAFB;
  --success:#059669;
  --warning:#D97706;
  --danger:#DC2626;
  --radius:12px;
  --radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --sidebar-w:240px;
  --topbar-h:52px;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:rgba(232,80,10,.12)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);background:var(--sidebar-bg);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-left h1{color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.01em}
.topbar-left .badge{font-size:9px;background:var(--orange);color:#fff;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:8px}
.storage-pill{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.45);font-size:10px;font-weight:500}
.storage-bar{width:50px;height:3px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
.storage-fill{height:100%;border-radius:2px;transition:width .3s}
.tbtn{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;padding:6px 14px;border-radius:6px;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;text-decoration:none;white-space:nowrap}
.tbtn-ghost{background:transparent;color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.1)}.tbtn-ghost:hover{color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.25)}
.tbtn-outline{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.12)}.tbtn-outline:hover{background:rgba(255,255,255,.14);color:#fff}
.tbtn-save{background:var(--orange);color:#fff}.tbtn-save:hover{background:var(--orange-hover)}

/* SIDEBAR */
.sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;width:var(--sidebar-w);background:var(--sidebar-bg);overflow-y:auto;z-index:90;padding:8px 0}
.sidebar-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.25);padding:14px 16px 4px;display:block}
.sidebar a{display:flex;align-items:center;gap:9px;padding:8px 16px;margin:1px 6px;border-radius:7px;color:var(--sidebar-text);text-decoration:none;font-size:12.5px;font-weight:500;transition:all .12s;cursor:pointer;position:relative}
.sidebar a:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.05)}
.sidebar a.active{color:#fff;background:rgba(232,80,10,.14)}
.sidebar a.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--orange);border-radius:0 3px 3px 0}
.sidebar .ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}

/* MAIN */
.main{margin-left:var(--sidebar-w);margin-top:var(--topbar-h);padding:24px 28px 60px;min-height:calc(100vh - var(--topbar-h));max-width:960px}
.section-hdr{margin-bottom:20px}
.section-hdr h2{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700;color:var(--sidebar-bg);letter-spacing:-.02em;margin-bottom:2px}
.section-hdr p{color:var(--text-muted);font-size:12.5px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:11px;font-weight:700;margin-bottom:12px;color:var(--sidebar-bg);text-transform:uppercase;letter-spacing:.4px}

/* PREVIEW */
.preview-card{background:linear-gradient(135deg,#f8f9fb,#f0f1f3);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;position:relative}
.preview-tag{position:absolute;top:10px;right:10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);background:#fff;padding:2px 7px;border-radius:4px;border:1px solid var(--border)}

/* FORMS */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11.5px;font-weight:600;color:var(--text);margin-bottom:4px}
.fg .hint{font-weight:400;color:var(--text-muted);font-size:10.5px;margin-left:3px}
.fg .helper{font-size:10.5px;color:var(--text-muted);margin-top:2px}
.char-ct{font-size:10.5px;font-weight:500;margin-top:2px;transition:color .2s}
.char-ct.good{color:var(--success)}.char-ct.warn{color:var(--warning)}.char-ct.bad{color:var(--danger)}
input[type="text"],input[type="url"],input[type="email"],input[type="tel"],input[type="number"],textarea,select{
  width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:12.5px;font-family:'Inter',sans-serif;color:var(--text);
  transition:border-color .15s,box-shadow .15s;background:#fff;outline:none
}
input:focus,textarea:focus,select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,80,10,.07)}
textarea{resize:vertical;min-height:64px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}

/* IMAGE UPLOAD */
.img-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbfc;position:relative;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.img-zone:hover,.img-zone.dragover{border-color:var(--orange);background:rgba(232,80,10,.03)}
.img-zone .uz-icon{font-size:24px;color:var(--text-muted);line-height:1}
.img-zone .uz-text{font-size:11px;color:var(--text-muted);font-weight:500}
.img-zone .uz-hint{font-size:10px;color:#9ca3af}
.img-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-zone.has-img{padding:6px}
.img-zone.has-img .uz-placeholder{display:none}
.img-preview{position:relative;display:inline-block}
.img-preview img{max-width:100%;max-height:140px;border-radius:var(--radius-sm);object-fit:cover;display:block}
.img-preview .img-acts{position:absolute;top:4px;right:4px;display:flex;gap:2px}
.img-preview .img-acts button{width:22px;height:22px;border-radius:4px;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);color:#fff;backdrop-filter:blur(4px)}
.img-preview .img-acts button:hover{background:rgba(0,0,0,.8)}
.url-toggle{font-size:10.5px;color:#3b82f6;cursor:pointer;margin-top:4px;display:inline-block;font-weight:500}
.url-toggle:hover{text-decoration:underline}
.url-row{display:none;margin-top:5px;gap:5px}
.url-row.show{display:flex}
.url-row input{flex:1}

/* BUTTONS */
.btn{font-family:'Inter',sans-serif;font-size:11.5px;font-weight:600;padding:6px 13px;border-radius:6px;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.btn-primary{background:var(--orange);color:#fff}.btn-primary:hover{background:var(--orange-hover)}
.btn-secondary{background:var(--sidebar-bg);color:#fff}.btn-secondary:hover{opacity:.9}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:#999;background:#f9fafb}
.btn-danger{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}.btn-danger:hover{background:#fee2e2}
.btn-ghost{background:transparent;color:var(--text-muted);padding:4px 7px}.btn-ghost:hover{color:var(--text);background:#f3f4f6}
.btn-sm{padding:4px 9px;font-size:10.5px}
.btn-icon{width:28px;height:28px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:12px;transition:all .15s}
.btn-icon:hover{background:#f3f4f6;border-color:#999}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.chip{display:inline-flex;align-items:center;gap:3px;background:#f0f9ff;border:1px solid #bae6fd;color:#0369a1;padding:2px 8px;border-radius:14px;font-size:10.5px;font-weight:500}
.chip button{background:none;border:none;cursor:pointer;color:#0369a1;font-size:12px;padding:0 1px;line-height:1}
.chip button:hover{color:var(--danger)}
.chip-row{display:flex;gap:5px;margin-top:6px}
.chip-row input{flex:1}

/* REPEATER */
.rpt-item{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;background:#fafbfc;transition:border-color .15s}
.rpt-item:hover{border-color:#d1d5db}
.rpt-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.rpt-title{font-size:12px;font-weight:600;color:var(--sidebar-bg)}
.rpt-acts{display:flex;gap:3px}

/* PROJECT */
.proj-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;background:#fff;cursor:pointer;transition:all .12s}
.proj-item:hover{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,80,10,.07)}
.proj-item.expanded{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,80,10,.1);border-bottom-left-radius:0;border-bottom-right-radius:0}
.proj-item img{width:46px;height:46px;border-radius:var(--radius-sm);object-fit:cover;flex-shrink:0}
.proj-item .pi-info{flex:1;min-width:0}
.proj-item .pi-info h4{font-size:13px;font-weight:600;margin-bottom:1px}
.proj-item .pi-info p{font-size:11px;color:var(--text-muted)}
.proj-editor{display:none;border:1px solid var(--orange);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);padding:18px;margin-top:-6px;margin-bottom:5px;background:#fffbf5}
.proj-editor.open{display:block}

/* GALLERY */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin-top:8px}
.gallery-item{position:relative;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);background:#f9fafb}
.gallery-item:hover{border-color:var(--orange)}
.gallery-item img{width:100%;height:70px;object-fit:cover;display:block}
.gallery-item .ga{display:flex;justify-content:center;gap:2px;padding:2px}
.gallery-item .ga button{font-size:9px;padding:1px 4px}

/* TABS */
.tabs{display:flex;gap:1px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.tab{padding:7px 14px;font-size:11.5px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.toggle{position:relative;width:34px;height:18px;cursor:pointer;display:inline-block}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle .slider{position:absolute;inset:0;background:#d1d5db;border-radius:9px;transition:.2s}
.toggle .slider::before{content:'';position:absolute;left:2px;top:2px;width:14px;height:14px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:var(--orange)}
.toggle input:checked+.slider::before{transform:translateX(16px)}
.toggle-label{font-size:12px;font-weight:500}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.dash-stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);text-align:center;transition:all .2s}
.dash-stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.dash-stat .ds-val{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--orange)}
.dash-stat .ds-label{font-size:11px;color:var(--text-muted);margin-top:2px}
.dash-links{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px}
.dash-links a{display:flex;align-items:center;gap:6px;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);text-decoration:none;color:var(--text);font-size:11.5px;font-weight:500;transition:all .12s}
.dash-links a:hover{border-color:var(--orange);color:var(--orange)}
.last-saved{font-size:11px;color:var(--text-muted);margin-bottom:14px;display:flex;align-items:center;gap:5px}

/* PREVIEW COMPONENTS */
.hero-prev{background:var(--sidebar-bg);border-radius:var(--radius);padding:20px;color:#fff;display:flex;gap:16px;align-items:center;overflow:hidden}
.hero-prev .hp-content{flex:1;min-width:0}
.hero-prev .hp-badge{display:inline-block;background:rgba(232,80,10,.15);color:var(--orange);font-size:9px;font-weight:600;padding:2px 8px;border-radius:16px;margin-bottom:6px}
.hero-prev .hp-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;line-height:1.2;margin-bottom:5px}
.hero-prev .hp-desc{font-size:10.5px;color:rgba(255,255,255,.55);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hero-prev .hp-stat{display:flex;align-items:baseline;gap:3px;margin-top:8px}
.hero-prev .hp-stat .num{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--orange)}
.hero-prev .hp-stat .lbl{font-size:10px;color:rgba(255,255,255,.45)}
.hero-prev .hp-img{width:90px;height:90px;border-radius:var(--radius-sm);object-fit:cover;flex-shrink:0}
.stat-prev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat-prev-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.stat-prev-card .spv{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:var(--orange)}
.stat-prev-card .spl{font-size:10px;color:var(--text-muted);margin-top:2px}
.why-prev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.why-prev-tile{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px}
.why-prev-tile h5{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;color:var(--sidebar-bg);margin-bottom:2px}
.why-prev-tile p{font-size:9.5px;color:var(--text-muted);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.svc-prev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.svc-prev-tile{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.svc-prev-tile img{width:100%;height:50px;object-fit:cover}
.svc-prev-tile .st-title{font-size:10px;font-weight:600;padding:5px 7px;color:var(--sidebar-bg)}
.client-prev-grid{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0}
.client-prev-item{width:52px;height:36px;border:1px solid var(--border);border-radius:5px;overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center}
.client-prev-item img{max-width:90%;max-height:90%;object-fit:contain}
.about-prev{display:flex;gap:14px;align-items:flex-start}
.about-prev-text{flex:1;min-width:0}
.about-prev-text h4{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--sidebar-bg);margin-bottom:4px}
.about-prev-text p{font-size:10px;color:var(--text-muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}
.about-prev-imgs{display:flex;gap:5px;flex-shrink:0}
.about-prev-imgs img{width:44px;height:44px;border-radius:5px;object-fit:cover}
.faq-prev-item{border:1px solid var(--border);border-radius:5px;padding:8px 10px;margin-bottom:3px;background:#fff}
.faq-prev-item .fpq{font-size:11px;font-weight:600;color:var(--sidebar-bg)}
.faq-prev-item .fpa{font-size:10px;color:var(--text-muted);margin-top:1px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.cta-prev{background:var(--sidebar-bg);border-radius:var(--radius);padding:20px;text-align:center}
.cta-prev h4{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
.cta-prev p{font-size:11px;color:rgba(255,255,255,.55);margin-bottom:10px}
.cta-prev .cta-btn-prev{display:inline-block;background:var(--orange);color:#fff;padding:6px 16px;border-radius:5px;font-size:11px;font-weight:600}
.contact-prev{display:flex;gap:14px;flex-wrap:wrap}
.contact-prev-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text)}
.contact-prev-item .cpi-icon{font-size:14px;color:var(--orange)}
.test-prev{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.test-prev-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}
.test-prev-card .tq{font-size:10px;color:var(--text-muted);line-height:1.4;font-style:italic;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.test-prev-card .tn{font-size:10.5px;font-weight:600;color:var(--sidebar-bg)}
.test-prev-card .tr{font-size:9.5px;color:var(--text-muted)}

/* SEO GAUGE */
.gauge-wrap{display:flex;align-items:center;gap:20px;margin-bottom:16px}
.gauge-canvas{width:120px;height:120px}
.gauge-info .gi-score{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;color:var(--sidebar-bg)}
.gauge-info .gi-label{font-size:12px;color:var(--text-muted)}
.seo-checks{display:flex;flex-direction:column;gap:5px}
.seo-check{display:flex;align-items:flex-start;gap:8px;font-size:12px;padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#fafbfc;cursor:pointer}
.seo-check .sc-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.seo-check.pass .sc-icon{color:var(--success)}
.seo-check.warn .sc-icon{color:var(--warning)}
.seo-check.fail .sc-icon{color:var(--danger)}
.seo-check .sc-body{flex:1;min-width:0}
.seo-check .sc-name{font-weight:600;color:var(--text)}
.seo-check .sc-val{font-size:11px;color:var(--text-muted);margin-top:1px}
.seo-check .sc-tip{font-size:11px;color:var(--text-muted);margin-top:4px;padding-top:4px;border-top:1px solid var(--border);display:none;line-height:1.4}
.seo-check.open .sc-tip{display:block}

/* KEYWORD TRACKER */
.kw-table{width:100%;border-collapse:collapse;font-size:12px}
.kw-table th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--text-muted);padding:6px 8px;border-bottom:1px solid var(--border)}
.kw-table td{padding:8px;border-bottom:1px solid var(--border);vertical-align:middle}
.kw-table tr:last-child td{border-bottom:none}
.kw-change{display:inline-flex;align-items:center;gap:2px;font-size:11px;font-weight:600;border-radius:4px;padding:1px 5px}
.kw-change.up{color:var(--success);background:#f0fdf4}
.kw-change.down{color:var(--danger);background:#fef2f2}
.kw-change.same{color:var(--text-muted);background:#f3f4f6}
.kw-pos-input{width:60px;padding:4px 6px;font-size:11px;border:1px solid var(--border);border-radius:4px;text-align:center}

/* CLIENT GRID */
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--sidebar-bg);color:#fff;padding:10px 18px;border-radius:10px;font-size:12px;font-weight:500;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 32px rgba(0,0,0,.2);display:flex;align-items:center;gap:6px}

  <div style="background:#fff;border-radius:16px;padding:48px;max-width:400px;width:90%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,0.3);">
    <div style="font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:#0F1B2D;margin-bottom:4px;">Trivex Admin</div>
    <p style="font-size:14px;color:#6B7280;margin-bottom:32px;">Log in to manage your website.</p>
    <input type="email" id="loginEmail" placeholder="Email" onkeydown="if(event.key==='Enter')document.getElementById('loginPassword').focus()"
      style="width:100%;padding:14px 16px;border-radius:10px;border:1.5px solid #E5E7EB;font-family:'Inter',sans-serif;font-size:15px;outline:none;margin-bottom:12px;background:#F9FAFB;">
    <input type="password" id="loginPassword" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"
      style="width:100%;padding:14px 16px;border-radius:10px;border:1.5px solid #E5E7EB;font-family:'Inter',sans-serif;font-size:15px;outline:none;margin-bottom:16px;background:#F9FAFB;letter-spacing:2px;">
    <button onclick="doLogin()"
      style="width:100%;padding:14px;border-radius:10px;background:#E8500A;color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;border:none;cursor:pointer;">
      Log In
    </button>
    <p id="loginError" style="font-size:13px;color:#DC2626;margin-top:12px;display:none;">Incorrect password.</p>
  </div>
</div>
<script>
// Credentials are hashed — not stored in plain text
const ADMIN_EMAIL_HASH = 'e14304eb9c18593495c0a3ef5742ef0ec302691f043672de70109fdd6aed3c75';
const ADMIN_PASS_HASH = 'd7e507c10cfd8dba042bb1530e1994efa0fa079855e277f050a00944bbe0bc64';

function sha256(str) {
  const buf = new TextEncoder().encode(str);
  return crypto.subtle.digest('SHA-256', buf).then(h => {
    return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('');
  });
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pw = document.getElementById('loginPassword').value;
  const emailHash = await sha256(email);
  const passHash = await sha256(pw);
  if (emailHash === ADMIN_EMAIL_HASH && passHash === ADMIN_PASS_HASH) {
    sessionStorage.setItem('trivex_admin_auth', 'true');
    document.getElementById('loginGate').style.display = 'none';
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginPassword').style.borderColor = '#DC2626';
    document.getElementById('loginEmail').style.borderColor = '#DC2626';
    setTimeout(() => {
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('loginPassword').style.borderColor = '#E5E7EB';
      document.getElementById('loginEmail').style.borderColor = '#E5E7EB';
    }, 2000);
  }
}

// Check if already authenticated this session
if (sessionStorage.getItem('trivex_admin_auth') === 'true') {
  document.getElementById('loginGate').style.display = 'none';
}
</script>

// ====================== STORAGE ======================
function updateStorage() {
  let total = 0;
  for (let i = 0; i < localStorage.length; i++) {
    total += localStorage.getItem(localStorage.key(i)).length * 2;
  }
  const kb = (total / 1024).toFixed(0);
  const mb = (total / (1024*1024)).toFixed(1);
  const pct = Math.min((total / (5*1024*1024)) * 100, 100);
  const t = document.getElementById('storageText');
  const f = document.getElementById('storageFill');
  if (t) {
    t.textContent = total > 1024*1024 ? mb + ' MB' : kb + ' KB';
    f.style.width = pct + '%';
    f.style.background = pct > 80 ? 'var(--danger)' : pct > 50 ? 'var(--warning)' : 'var(--success)';
  }
  return { total, pct };
}

// ====================== IMAGE UPLOAD ======================
function imgUpload(fieldId, currentValue) {
  const has = currentValue && currentValue.length > 0;
  return `
    <div class="img-zone ${has ? 'has-img' : ''}" id="zone-${fieldId}"
         ondragover="imgDragOver(event,'${fieldId}')" ondragleave="imgDragLeave(event,'${fieldId}')"
         ondrop="imgDrop(event,'${fieldId}')">
      <input type="file" accept="image/*" onchange="imgSelect(event,'${fieldId}')" id="file-${fieldId}">
      <div class="uz-placeholder" ${has ? 'style="display:none"' : ''}>
        <div class="uz-icon">&#128247;</div>
        <div class="uz-text">Drop image or click to upload</div>
        <div class="uz-hint">PNG, JPG, WebP up to 2MB</div>
      </div>
      ${has ? `
        <div class="img-preview" id="prev-${fieldId}">
          <img src="${esc(currentValue)}" onerror="this.style.display='none'">
          <div class="img-acts">
            <button onclick="event.stopPropagation();imgReplace('${fieldId}')" title="Replace">&#8635;</button>
            <button onclick="event.stopPropagation();imgClear('${fieldId}')" title="Remove">&#10005;</button>
          </div>
        </div>
      ` : `<div class="img-preview" id="prev-${fieldId}" style="display:none"><img src=""><div class="img-acts"><button onclick="event.stopPropagation();imgReplace('${fieldId}')">&#8635;</button><button onclick="event.stopPropagation();imgClear('${fieldId}')">&#10005;</button></div></div>`}
    </div>
    <input type="hidden" id="${fieldId}" value="${esc(currentValue)}">
    <span class="url-toggle" onclick="toggleUrl('${fieldId}')">or paste URL</span>
    <div class="url-row" id="url-row-${fieldId}">
      <input type="url" id="url-${fieldId}" placeholder="https://example.com/image.jpg">
      <button class="btn btn-outline btn-sm" onclick="applyUrl('${fieldId}')">Apply</button>
    </div>`;
}

function imgDragOver(e, id) { e.preventDefault(); e.stopPropagation(); document.getElementById('zone-'+id).classList.add('dragover'); }
function imgDragLeave(e, id) { e.preventDefault(); e.stopPropagation(); document.getElementById('zone-'+id).classList.remove('dragover'); }
function imgDrop(e, id) { e.preventDefault(); e.stopPropagation(); document.getElementById('zone-'+id).classList.remove('dragover'); if (e.dataTransfer.files.length) processImg(e.dataTransfer.files[0], id); }
function imgSelect(e, id) { if (e.target.files.length) processImg(e.target.files[0], id); }
function processImg(file, id) {
  if (!file.type.startsWith('image/')) { toast('Please select an image file', true); return; }
  if (file.size > 5*1024*1024) { toast('File too large (max 5MB)', true); return; }
  const r = new FileReader();
  r.onload = function(e) { setImg(id, e.target.result); const s = updateStorage(); if (s.total > 4*1024*1024) toast('Storage nearly full. Use URLs for large images.', true); };
  r.readAsDataURL(file);
}
function setImg(id, v) {
  const h = document.getElementById(id); if (h) h.value = v;
  const z = document.getElementById('zone-'+id);
  const p = document.getElementById('prev-'+id);
  const ph = z ? z.querySelector('.uz-placeholder') : null;
  if (z) z.classList.add('has-img');
  if (ph) ph.style.display = 'none';
  if (p) { p.style.display = 'inline-block'; const img = p.querySelector('img'); if (img) { img.src = v; img.style.display = 'block'; } }
}
function imgClear(id) {
  const h = document.getElementById(id); if (h) h.value = '';
  const z = document.getElementById('zone-'+id);
  const p = document.getElementById('prev-'+id);
  const ph = z ? z.querySelector('.uz-placeholder') : null;
  if (z) z.classList.remove('has-img');
  if (ph) ph.style.display = '';
  if (p) p.style.display = 'none';
}
function imgReplace(id) { const f = document.getElementById('file-'+id); if (f) f.click(); }
function toggleUrl(id) { const r = document.getElementById('url-row-'+id); if (r) r.classList.toggle('show'); }
function applyUrl(id) { const u = document.getElementById('url-'+id).value.trim(); if (!u) return; setImg(id, u); document.getElementById('url-row-'+id).classList.remove('show'); }

// ====================== GITHUB DEPLOY CONFIG ======================
const GITHUB_REPO = 'ismailomran08-stack/trivex';
const GITHUB_FILE = 'site-data.json';
const GITHUB_BRANCH = 'main';
function getGitHubToken() {
  let token = localStorage.getItem('trivex_gh_token');
  if (!token) {
    token = prompt('Enter your GitHub Personal Access Token to enable direct deploy.\nThis is saved in your browser only (never sent anywhere except GitHub).\n\nYou can generate one at: github.com/settings/tokens');
    if (token) localStorage.setItem('trivex_gh_token', token);
  }
  return token;
}

// ====================== SAVE & DEPLOY ======================
async function saveAll() {
  collectAll();
  data.lastSaved = new Date().toISOString();
  data.adminDeployed = true;

  // Save to localStorage (for local preview)
  try {
    localStorage.setItem('trivex_site_data', JSON.stringify(data));
    updateStorage();
  } catch(e) {}

  // Deploy to GitHub → Vercel
  toast('Saving & deploying to live site...');
  try {
    const json = JSON.stringify(data, null, 2);
    const token = getGitHubToken();
    if (!token) { toast('Deploy cancelled — no GitHub token.', true); return; }

    const content = btoa(unescape(encodeURIComponent(json)));

    // Get current file SHA (needed for updates)
    let sha = null;
    try {
      const existing = await fetch('https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + GITHUB_FILE + '?ref=' + GITHUB_BRANCH, {
        headers: { 'Authorization': 'token ' + token }
      });
      if (existing.ok) {
        const fileData = await existing.json();
        sha = fileData.sha;
      }
    } catch(e) {}

    // Push to GitHub
    const body = {
      message: 'Update site content — ' + new Date().toLocaleString(),
      content: content,
      branch: GITHUB_BRANCH
    };
    if (sha) body.sha = sha;

    const res = await fetch('https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + GITHUB_FILE, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + token,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (res.ok) {
      toast('Saved & deployed! Live in ~30 seconds.');
    } else {
      const err = await res.json();
      if (res.status === 401) {
        localStorage.removeItem('trivex_gh_token');
        toast('Invalid token — cleared. Click Save & Deploy again to re-enter.', true);
      } else {
        toast('Deploy failed: ' + (err.message || 'Unknown error'), true);
      }
    }
  } catch(e) {
    toast('Deploy error: ' + e.message, true);
  }
}

function exportForDeploy() {
  collectAll();
  data.lastSaved = new Date().toISOString();
  localStorage.setItem('trivex_site_data', JSON.stringify(data));
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'site-data.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('site-data.json downloaded as backup.');
}
function resetData() {
  if (!confirm('Reset all data to defaults? This erases all changes.')) return;
  localStorage.removeItem('trivex_site_data');
  location.reload();
}
function toast(msg, isErr) {
  const t = document.getElementById('toast');
  t.className = 'toast' + (isErr ? ' error' : '');
  t.innerHTML = `<span>${isErr ? '&#9888;' : '&#10003;'}</span> ${msg}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

  document.querySelectorAll('.sidebar a').forEach(a => a.classList.toggle('active', a.dataset.section === section));
  render();
  window.scrollTo({ top: 0 });
}

function render() {
  const m = document.getElementById('mainContent');
  const renderers = {
    dashboard: renderDashboard, hero: renderHero, stats: renderStats, whyTrivex: renderWhy,
    services: renderServices, portfolio: renderPortfolio, testimonials: renderTestimonials,
    clients: renderClients, about: renderAbout, faq: renderFAQ, ctaBanner: renderCTA,
    contact: renderContact, seo: renderSEO
  };
  m.innerHTML = (renderers[activeSection] || renderDashboard)();
  updateStorage();
  // Post-render hooks
  if (activeSection === 'seo' && seoTab === 'analyzer') drawGauge();
  if (activeSection === 'seo' && seoTab === 'tracker') drawChart();
}

// Portfolio helpers
function galDragOver(e, pid) { e.preventDefault(); e.stopPropagation(); document.getElementById('gallery-drop-'+pid).classList.add('dragover'); }
function galDragLeave(e, pid) { e.preventDefault(); e.stopPropagation(); document.getElementById('gallery-drop-'+pid).classList.remove('dragover'); }
function galDrop(e, pid) { e.preventDefault(); e.stopPropagation(); document.getElementById('gallery-drop-'+pid).classList.remove('dragover'); processGalFiles(Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')), pid); }
function galFiles(e, pid) { processGalFiles(Array.from(e.target.files).filter(f=>f.type.startsWith('image/')), pid); }
function processGalFiles(files, pid) {
  collectExpandedProject();
  let done = 0;
  files.forEach(file => {
    const r = new FileReader();
    r.onload = function(e) { data.portfolio.projects[pid].gallery.push(e.target.result); done++; if (done === files.length) render(); };
    r.readAsDataURL(file);
  });
}
function toggleProject(pid) { collectExpandedProject(); expandedProject = expandedProject === pid ? null : pid; render(); }
function addProject() {
  collectAll();
  const name = prompt('Project name:');
  if (!name) return;
  const slug = name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+$/,'');
  if (data.portfolio.projects[slug]) { alert('Project with that slug exists.'); return; }
  data.portfolio.projects[slug] = { id: slug, name, location: '', address: '', completed: '', type: '', image: '', cardImage: '', stats: [{val:'',label:''},{val:'',label:''},{val:'',label:''}], overview: '', scope: [], challenge: '', approach: '', gallery: [] };
  data.portfolio.projectOrder.push(slug);
  expandedProject = slug;
  render();
}
function deleteProject(pid) { if (!confirm('Delete "'+data.portfolio.projects[pid].name+'"?')) return; delete data.portfolio.projects[pid]; data.portfolio.projectOrder = data.portfolio.projectOrder.filter(p=>p!==pid); expandedProject = null; render(); }
function moveProject(i,d) { collectAll(); const a=data.portfolio.projectOrder; [a[i],a[i+d]]=[a[i+d],a[i]]; render(); }
function addScopeItem(pid) { const inp=document.getElementById('scope-input-'+pid); const v=inp.value.trim(); if(!v)return; collectExpandedProject(); data.portfolio.projects[pid].scope.push(v); inp.value=''; render(); }
function removeScopeItem(pid,i) { collectExpandedProject(); data.portfolio.projects[pid].scope.splice(i,1); render(); }
function addGallery(pid) { const inp=document.getElementById('gallery-input-'+pid); const v=inp.value.trim(); if(!v)return; collectExpandedProject(); data.portfolio.projects[pid].gallery.push(v); inp.value=''; render(); }
function removeGallery(pid,i) { collectExpandedProject(); data.portfolio.projects[pid].gallery.splice(i,1); render(); }
function moveGallery(pid,i,d) { collectExpandedProject(); const a=data.portfolio.projects[pid].gallery; [a[i],a[i+d]]=[a[i+d],a[i]]; render(); }

// ====================== SEO TOOLKIT ======================
function calcSEOScore() {
  const s = data.seo || {};
  const checks = getSEOChecks();
  let score = 0;
  checks.forEach(c => { if (c.status === 'pass') score++; else if (c.status === 'warn') score += 0.5; });
  return { score: Math.round(score), total: checks.length };
}

function getSEOChecks() {
  const s = data.seo || {};
  const tLen = (s.title||'').length;
  const dLen = (s.description||'').length;
  const kws = Array.isArray(s.keywords) ? s.keywords : [];
  const titleLower = (s.title||'').toLowerCase();
  const descLower = (s.description||'').toLowerCase();
  const kwInTitle = kws.some(k => titleLower.includes(k.toLowerCase()));
  const kwInDesc = kws.some(k => descLower.includes(k.toLowerCase()));
  const allImgsHaveAlt = data.clients && data.clients.logos && data.clients.logos.every(l => l.alt && l.alt.trim());
  const sd = s.structuredData || {};
  const hasOG = !!((s.og && s.og.title) || s.title);
  const hasTwitter = !!((s.twitter && s.twitter.title) || (s.og && s.og.title) || s.title);
  const hasSD = !!(sd.name && sd.name.trim());
  const isHTTPS = !!(s.canonical && s.canonical.startsWith('https'));
  const hasH1 = !!(data.hero && data.hero.titleLine1 && data.hero.titleLine1.trim());
  const sectionCount = [data.hero, data.stats, data.whyTrivex, data.services, data.portfolio, data.clients, data.about, data.faq, data.ctaBanner, data.contact].filter(Boolean).length;
  const hasFAQ = data.faq && data.faq.items && data.faq.items.length >= 3;

  return [
    { name: 'Title Tag Length', status: tLen >= 50 && tLen <= 60 ? 'pass' : tLen >= 40 && tLen <= 70 ? 'warn' : 'fail', value: tLen + ' chars (optimal 50-60)', tip: 'Keep your title between 50-60 characters for optimal display in search results.' },
    { name: 'Meta Description Length', status: dLen >= 150 && dLen <= 160 ? 'pass' : dLen >= 120 && dLen <= 170 ? 'warn' : 'fail', value: dLen + ' chars (optimal 150-160)', tip: 'Write a compelling description between 150-160 characters.' },
    { name: 'H1 Tag Present', status: hasH1 ? 'pass' : 'fail', value: hasH1 ? 'Found: "'+data.hero.titleLine1+'"' : 'Missing', tip: 'Set your hero title line 1 which becomes the H1 tag.' },
    { name: 'Keywords in Title', status: kwInTitle ? 'pass' : 'fail', value: kwInTitle ? 'Found' : 'No target keywords in title', tip: 'Include at least one target keyword in your page title.' },
    { name: 'Keywords in Description', status: kwInDesc ? 'pass' : 'fail', value: kwInDesc ? 'Found' : 'No target keywords in description', tip: 'Include target keywords naturally in your meta description.' },
    { name: 'Images Have Alt Text', status: allImgsHaveAlt ? 'pass' : 'warn', value: allImgsHaveAlt ? 'All client logos have alt text' : 'Some images missing alt text', tip: 'Add descriptive alt text to all images for accessibility and SEO.' },
    { name: 'Structured Data', status: hasSD ? 'pass' : 'fail', value: hasSD ? 'Organization: '+sd.name : 'Not configured', tip: 'Configure structured data in the SEO Settings tab.' },
    { name: 'Open Graph Tags', status: hasOG ? 'pass' : 'fail', value: hasOG ? 'Configured' : 'Missing', tip: 'Set Open Graph title and description for social sharing.' },
    { name: 'Twitter Card', status: hasTwitter ? 'pass' : 'fail', value: hasTwitter ? 'Configured' : 'Missing', tip: 'Configure Twitter Card tags for X/Twitter sharing.' },
    { name: 'Internal Linking (CTAs)', status: 'pass', value: 'CTA links to #contact', tip: 'Ensure CTAs link to relevant sections.' },
    { name: 'Mobile Responsive', status: 'pass', value: 'Yes - viewport meta tag set', tip: 'Your site is mobile responsive.' },
    { name: 'HTTPS Ready', status: isHTTPS ? 'pass' : 'fail', value: isHTTPS ? 'Canonical uses HTTPS' : 'Canonical not set or not HTTPS', tip: 'Set your canonical URL with https://.' },
    { name: 'Content Sections', status: sectionCount >= 8 ? 'pass' : 'warn', value: sectionCount + ' sections configured', tip: 'More content sections improve topical authority.' },
    { name: 'FAQ Schema Potential', status: hasFAQ ? 'pass' : 'warn', value: hasFAQ ? data.faq.items.length + ' FAQ items (schema ready)' : 'Add 3+ FAQ items for FAQ schema', tip: 'Having 3+ FAQ items enables FAQ rich snippets in Google.' }
  ];
}

function charCount(input, countId, min, max) {
  const len = input.value.length;
  const el = document.getElementById(countId);
  if (!el) return;
  el.textContent = len + ' / ' + max + ' characters';
  el.className = 'char-ct ' + (len >= min && len <= max ? 'good' : len > max ? 'bad' : 'warn');
}

// ====================== KEYWORD TRACKER ======================
function renderKeywordTracker() {
  const tracking = data.seo.keywords_tracking || [];
  let rows = '';
  tracking.forEach((kw, i) => {
    const positions = kw.positions || [];
    const latest = positions.length > 0 ? positions[positions.length - 1] : null;
    const prev = positions.length > 1 ? positions[positions.length - 2] : null;
    const curPos = latest ? latest.position : null;
    const prevPos = prev ? prev.position : null;
    let changeHtml = '<span class="kw-change same">--</span>';
    if (curPos !== null && prevPos !== null) {
      const diff = prevPos - curPos; // positive = improved (lower number = better)
      if (diff > 0) changeHtml = `<span class="kw-change up">&#9650; ${diff}</span>`;
      else if (diff < 0) changeHtml = `<span class="kw-change down">&#9660; ${Math.abs(diff)}</span>`;
      else changeHtml = '<span class="kw-change same">&#9654; 0</span>';
    }
    const lastDate = latest ? latest.date : '--';
    rows += `<tr>
      <td style="font-weight:500;max-width:220px;word-break:break-word">${esc(kw.keyword)}</td>
      <td style="font-size:11px;color:var(--text-muted)">${esc(kw.targetUrl)}</td>
      <td style="text-align:center;font-weight:600">${curPos !== null ? curPos : '--'}</td>
      <td style="text-align:center">${prevPos !== null ? prevPos : '--'}</td>
      <td style="text-align:center">${changeHtml}</td>
      <td style="font-size:10px;color:var(--text-muted)">${lastDate}</td>
      <td><div style="display:flex;gap:3px;align-items:center">
        <input type="number" class="kw-pos-input" id="kw-pos-${i}" placeholder="#" min="1">
        <button class="btn btn-outline btn-sm" onclick="updateKWPosition(${i})">Log</button>
      </div></td>
    </tr>`;
  });

  return `
    <div class="card"><div class="card-title">Keyword Rankings</div>
      <div style="overflow-x:auto">
        <table class="kw-table">
          <thead><tr><th>Keyword</th><th>Target URL</th><th>Position</th><th>Previous</th><th>Change</th><th>Last Checked</th><th>Update</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="chip-row" style="margin-top:12px">
        <input type="text" id="new-kw-input" placeholder="Add new keyword to track">
        <button class="btn btn-primary btn-sm" onclick="addTrackedKeyword()">Add Keyword</button>
      </div>
    </div>
    <div class="card"><div class="card-title">Position History</div>
      <canvas id="kwChart" width="880" height="300" style="width:100%;height:300px;border:1px solid var(--border);border-radius:var(--radius-sm)"></canvas>
      <div id="kwChartLegend" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;font-size:10px"></div>
    </div>`;
}

function updateKWPosition(i) {
  const inp = document.getElementById('kw-pos-'+i);
  const pos = parseInt(inp.value);
  if (isNaN(pos) || pos < 1) { toast('Enter a valid position (1+)', true); return; }
  const today = new Date().toISOString().split('T')[0];
  data.seo.keywords_tracking[i].positions.push({ position: pos, date: today });
  inp.value = '';
  render();
}

function addTrackedKeyword() {
  const inp = document.getElementById('new-kw-input');
  const kw = inp.value.trim();
  if (!kw) return;
  data.seo.keywords_tracking.push({ keyword: kw, targetUrl: '/', positions: [], notes: '' });
  inp.value = '';
  render();
}

const CHART_COLORS = ['#E8500A','#3b82f6','#059669','#D97706','#DC2626','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316'];

function drawChart() {
  const canvas = document.getElementById('kwChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 20, right: 20, bottom: 30, left: 40 };
  const cW = W - pad.left - pad.right, cH = H - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  const tracking = data.seo.keywords_tracking || [];
  // Collect all dates and positions
  let allDates = [];
  let maxPos = 10;
  tracking.forEach(kw => {
    (kw.positions || []).forEach(p => {
      if (p.position !== null) {
        allDates.push(p.date);
        if (p.position > maxPos) maxPos = p.position;
      }
    });
  });
  allDates = [...new Set(allDates)].sort();

  if (allDates.length === 0) {
    ctx.fillStyle = '#6B7280';
    ctx.font = '12px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No position data yet. Log keyword positions to see the chart.', W/2, H/2);
    return;
  }

  maxPos = Math.ceil(maxPos / 5) * 5;
  if (maxPos < 10) maxPos = 10;

  // Draw grid
  ctx.strokeStyle = '#E5E7EB';
  ctx.lineWidth = 0.5;
  ctx.font = '10px Inter, sans-serif';
  ctx.fillStyle = '#6B7280';
  ctx.textAlign = 'right';
  for (let p = 1; p <= maxPos; p += Math.max(1, Math.floor(maxPos / 5))) {
    const y = pad.top + (p - 1) / (maxPos - 1) * cH;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillText(p, pad.left - 6, y + 3);
  }

  // X-axis labels
  ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(allDates.length / 6));
  allDates.forEach((d, i) => {
    if (i % step === 0 || i === allDates.length - 1) {
      const x = pad.left + (allDates.length === 1 ? cW / 2 : i / (allDates.length - 1) * cW);
      ctx.fillText(d.substring(5), x, H - 8);
    }
  });

  // Draw lines
  const legend = document.getElementById('kwChartLegend');
  let legendHtml = '';
  tracking.forEach((kw, ki) => {
    const pts = (kw.positions || []).filter(p => p.position !== null);
    if (pts.length === 0) return;
    const color = CHART_COLORS[ki % CHART_COLORS.length];
    legendHtml += `<span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:3px;background:${color};border-radius:1px"></span>${esc(kw.keyword)}</span>`;

    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    pts.forEach((p, pi) => {
      const di = allDates.indexOf(p.date);
      const x = pad.left + (allDates.length === 1 ? cW / 2 : di / (allDates.length - 1) * cW);
      const y = pad.top + (p.position - 1) / (maxPos - 1) * cH;
      if (pi === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Dots
    ctx.fillStyle = color;
    pts.forEach(p => {
      const di = allDates.indexOf(p.date);
      const x = pad.left + (allDates.length === 1 ? cW / 2 : di / (allDates.length - 1) * cW);
      const y = pad.top + (p.position - 1) / (maxPos - 1) * cH;
      ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
    });
  });
  if (legend) legend.innerHTML = legendHtml;

  // Y-axis label
  ctx.save();
  ctx.translate(10, pad.top + cH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = '#6B7280';
  ctx.font = '10px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Position (1 = best)', 0, 0);
  ctx.restore();
}

// ====================== SEO ANALYZER ======================
function renderSEOAnalyzer() {
  const checks = getSEOChecks();
  const score = calcSEOScore();
  let checksHtml = '';
  checks.forEach((c, i) => {
    const icon = c.status === 'pass' ? '&#10003;' : c.status === 'warn' ? '&#9888;' : '&#10007;';
    checksHtml += `<div class="seo-check ${c.status}" onclick="this.classList.toggle('open')">
      <span class="sc-icon">${icon}</span>
      <div class="sc-body">
        <div class="sc-name">${c.name}</div>
        <div class="sc-val">${c.value}</div>
        <div class="sc-tip"><strong>How to fix:</strong> ${c.tip}</div>
      </div>
    </div>`;
  });

  return `
    <div class="card">
      <div class="card-title">SEO Health Score</div>
      <div class="gauge-wrap">
        <canvas id="gaugeCanvas" class="gauge-canvas" width="240" height="240"></canvas>
        <div class="gauge-info">
          <div class="gi-score">${score.score}/${score.total}</div>
          <div class="gi-label">checks passing</div>
        </div>
      </div>
    </div>
    <div class="card"><div class="card-title">Detailed Checks</div>
      <p class="helper" style="margin-bottom:10px">Click any check to see how to fix it.</p>
      <div class="seo-checks">${checksHtml}</div>
    </div>`;
}

function drawGauge() {
  const canvas = document.getElementById('gaugeCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 240 * dpr;
  canvas.height = 240 * dpr;
  ctx.scale(dpr, dpr);

  const score = calcSEOScore();
  const pct = score.total > 0 ? score.score / score.total : 0;
  const cx = 120, cy = 120, r = 90;
  const startAngle = 0.75 * Math.PI;
  const endAngle = 2.25 * Math.PI;
  const totalArc = endAngle - startAngle;

  // Background arc
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, endAngle);
  ctx.strokeStyle = '#E5E7EB';
  ctx.lineWidth = 14;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Score arc
  const scoreEnd = startAngle + totalArc * pct;
  const color = pct >= 0.8 ? '#059669' : pct >= 0.5 ? '#D97706' : '#DC2626';
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, scoreEnd);
  ctx.strokeStyle = color;
  ctx.lineWidth = 14;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Center text
  const pctNum = Math.round(pct * 100);
  ctx.fillStyle = '#111827';
  ctx.font = 'bold 36px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(pctNum + '%', cx, cy - 6);
  ctx.fillStyle = '#6B7280';
  ctx.font = '11px "Inter", sans-serif';
  ctx.fillText('SEO Score', cx, cy + 22);
}

  a.addEventListener('click', e => { e.preventDefault(); switchSection(a.dataset.section); });
});

loadData();
render();
